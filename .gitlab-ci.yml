include:
  - local: finance-flow/.gitlab-ci.yml

image: python:3.11

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  paths:
    - .pip-cache/
    - .cache/pre-commit/

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install pre-commit ruff mypy bandit vulture pip-audit

stages:
  - lint
  - typecheck
  - test
  - security
  - quality
  - audit

# ── Lint ────────────────────────────────────────────────────
pre-commit:
  stage: lint
  script:
    - pre-commit run --all-files --show-diff-on-failure

# ── Type checking ───────────────────────────────────────────
mypy:
  stage: typecheck
  script:
    - mypy analytics/ config/ database/ pages/ utils/ app.py --ignore-missing-imports

# ── Tests ───────────────────────────────────────────────────
pytest:
  stage: test
  script:
    - python -m pytest tests/ -v --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml

# ── Security scan ───────────────────────────────────────────
bandit:
  stage: security
  script:
    - bandit -r analytics/ config/ database/ pages/ utils/ app.py -s B101,B311
  allow_failure: true

# ── Dead code check ─────────────────────────────────────────
vulture:
  stage: quality
  script:
    - vulture analytics/ config/ database/ pages/ utils/ app.py --min-confidence 70

# ── Package audit ───────────────────────────────────────────
pip-audit:
  stage: audit
  script:
    - pip-audit --strict --timeout 30
